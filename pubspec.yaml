name: link_decay_app
description: "LinkShelf — a local-first reading list with time-based freshness decay."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Database — Drift ORM
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  path_provider: ^2.1.5
  sqlite3_flutter_libs: ^0.5.28

  # Firebase & Authentication
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  google_sign_in: ^6.2.1

  # State Management — Riverpod
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking & Metadata
  http: ^1.4.0
  html: ^0.15.5

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Share Intent
  receive_sharing_intent: ^1.8.0

  # Utilities
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  timeago: ^3.7.0
  shared_preferences: ^2.3.5
  file_picker: ^8.1.2
  share_plus: ^10.1.2
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

  # Code generation
  drift_dev: ^2.22.1
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  riverpod_lint: ^2.6.5
  custom_lint: ^0.7.5

flutter:
  uses-material-design: true

# Launcher icons configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FAFAF9" # Matches warm stone background
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

